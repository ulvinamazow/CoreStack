version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: corestack-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-corestack}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./supabase/migrations:/docker-entrypoint-initdb.d
    networks:
      - corestack-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # CoreStack API
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: corestack-api
    environment:
      # Database Configuration
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_NAME: ${DB_NAME:-corestack}
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
      JWT_ACCESS_HOURS: ${JWT_ACCESS_HOURS:-24}
      JWT_REMEMBER_DAYS: ${JWT_REMEMBER_DAYS:-30}
      JWT_REFRESH_DAYS: ${JWT_REFRESH_DAYS:-60}
      
      # SMTP Configuration (Email)
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-} # Set to empty string if not using SMTP
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      APP_URL: ${APP_URL:-http://localhost:5000}
      VERIFICATION_TOKEN_EXPIRY_HOURS: ${VERIFICATION_TOKEN_EXPIRY_HOURS:-72}
      
      # Stripe Configuration
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      
      # Application Configuration
      PORT: ${PORT:-5000}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
    
    ports:
      - "${PORT:-5000}:5000"
    
    depends_on:
      db:
        condition: service_healthy
    
    networks:
      - corestack-network
    
    restart: unless-stopped
    
    # Mount .env file if it exists
    env_file:
      - .env

volumes:
  postgres_data:
    driver: local

networks:
  corestack-network:
    driver: bridge
